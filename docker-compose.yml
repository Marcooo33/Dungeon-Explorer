services:
  server-dev:
    build:
      context: .
      dockerfile: ./.devcontainer/server/Dockerfile.dev
    ports:
      - "8080:8080"
    volumes:
      - ./server:/workspace/server
      - ./shared:/workspace/shared
    command: sleep infinity
    networks:
      - dungeon-net

  server-prod:
    build:
      context: .
      dockerfile: server/Dockerfile.prod
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8080"]
      interval: 1m30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - dungeon-net
    profiles:
      - prod

networks:
  dungeon-net:
    driver: bridge